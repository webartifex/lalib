[build-system]
build-backend = "poetry.core.masonry.api"
requires = ["poetry-core>=1.0.0"]

[tool.black]
line-length = 88
skip-string-normalization = true  # wemake-python-styleguide enforces single quotes
target-version = ["py38"]

[tool.poetry]
name = "lalib"
version = "0.1.0.dev0"

authors = [
    "Alexander Hess <alexander@webartifex.biz>",
]
description = "A Python library to study linear algebra"
keywords = [
    "python",
    "educational",
    "linear-algebra",
]
license = "MIT"

readme = "README.md"
homepage = "https://github.com/webartifex/lalib"
repository = "https://github.com/webartifex/lalib"

[tool.poetry.dependencies]
python = "^3.8"

[tool.poetry.dev-dependencies]
# Task Runners
nox = "^2020.12.31"

# Code Formatters
autoflake = "^1.4"
black = "^20.8b1"
isort = "^5.8.0"
