[build-system]
build-backend = "poetry.core.masonry.api"
requires = ["poetry-core>=1.0.0"]

[tool.black]
line-length = 88
skip-string-normalization = true  # wemake-python-styleguide enforces single quotes
target-version = ["py38"]

[tool.poetry]
name = "lalib"
version = "0.1.0.dev0"

authors = [
    "Alexander Hess <alexander@webartifex.biz>",
]
description = "A Python library to study linear algebra"
keywords = [
    "python",
    "educational",
    "linear-algebra",
]
license = "MIT"

readme = "README.md"
homepage = "https://github.com/webartifex/lalib"
repository = "https://github.com/webartifex/lalib"

[tool.poetry.dependencies]
python = "^3.8"

[tool.poetry.dev-dependencies]
# Task Runners
nox = "^2020.12.31"
pre-commit = "^2.12.1"

# Code Formatters
autoflake = "^1.4"
black = "^20.8b1"
isort = "^5.8.0"

# Code Linters
flake8 = "^3.9.1"
flake8-annotations = "^2.6.2"
flake8-black = "^0.2.1"
flake8-expression-complexity = "^0.0.9"
flake8-pytest-style = "^1.4.1"
mypy = "^0.812"
wemake-python-styleguide = "^0.15.2"  # flake8 plug-in

# Test Suite
packaging = "^20.9"  # used to test the packaged version
pytest = "^6.2.3"
pytest-cov = "^2.11.1"
